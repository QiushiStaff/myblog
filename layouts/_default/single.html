{{ define "content" }}
<article class="page-single">
    <header class="page-title">
        <h1>{{ .Title }}</h1>
        {{ with .Description }}
        <p class="page-desc">{{ . }}</p>
        {{ end }}
    </header>

    <section class="page-content">
        {{ .Content }}
    </section>
</article>
{{ end }}
