baseURL = 'https://qiushistaff.github.io/myblog/' # 确保全小写且包含子路径
languageCode = 'zh-cn'
title = '我的博客'
theme = 'hugo-theme-ladder'
defaultContentLanguage = 'zh'

# --- 关键设置：解决子目录部署问题 ---
relativeURLs = true         # 强制使用相对路径，解决 CSS 不加载的问题
canonifyURLs = false        # 配合上面的设置
hasCJKLanguage = true
summaryLength = 60

[params]
    author = "你的名字"
    authorDescription = "你的简介"
    math = true
    show_read_time = true 

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[languages.zh]
    languageName = "中文"
    
    [[languages.zh.menu.main]]
        name = "首页"
        url = "/"          # Hugo 会自动处理为 /myblog/
        weight = 1

    [[languages.zh.menu.main]]
        name = "文章"
        url = "blog"       # 不要以 / 开头，使用相对路径
        weight = 2